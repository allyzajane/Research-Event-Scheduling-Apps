openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Taif Children's Hospital Research Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User management
  - name: landingPage
    description: Landing page settings
  - name: documents
    description: Document management
  - name: articles
    description: Articles and blog posts
  - name: calendar
    description: Calendar events
  - name: settings
    description: Admin settings
  - name: notifications
    description: User notifications
  - name: roleDashboard
    description: Role-based dashboard widget configuration
paths:
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications for current user
      parameters:
        - name: unread_only
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Notification list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationList"
    delete:
      operationId: clearAllNotifications
      tags: [notifications]
      summary: Delete all notifications for current user
      responses:
        "200":
          description: Cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /notifications/unread-count:
    get:
      operationId: getUnreadCount
      tags: [notifications]
      summary: Get unread notification count
      responses:
        "200":
          description: Count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnreadCount"

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a single notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated notification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /notifications/broadcast:
    post:
      operationId: broadcastNotification
      tags: [notifications]
      summary: Send a notification to all users or a specific role (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BroadcastNotificationBody"
      responses:
        "200":
          description: Broadcast result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BroadcastResult"
    get:
      operationId: listBroadcasts
      tags: [notifications]
      summary: List broadcast history (admin only)
      responses:
        "200":
          description: Broadcast list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BroadcastList"

  /notifications/{id}:
    delete:
      operationId: deleteNotification
      tags: [notifications]
      summary: Delete a notification
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
    patch:
      operationId: updateMe
      tags: [auth]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /auth/upload-avatar:
    post:
      operationId: uploadAvatar
      tags: [auth]
      summary: Upload profile avatar photo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadFileBody"
      responses:
        "200":
          description: Uploaded avatar URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"

  /auth/upload-signature:
    post:
      operationId: uploadSignature
      tags: [auth]
      summary: Upload or save drawn signature (PNG/JPG/SVG)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadFileBody"
      responses:
        "200":
          description: Uploaded signature URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin only)
      parameters:
        - name: role
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new user (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserBody"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"

  /users/{id}/set-password:
    post:
      operationId: setUserPassword
      tags: [users]
      summary: Directly set a new password for a user (admin only, no email sent)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetPasswordBody"
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /users/stats:
    get:
      operationId: getUserStats
      tags: [users]
      summary: Get user statistics by role
      responses:
        "200":
          description: User stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserStats"

  /landing-page:
    get:
      operationId: getLandingPage
      tags: [landingPage]
      summary: Get landing page configuration
      responses:
        "200":
          description: Landing page config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LandingPageConfig"
    patch:
      operationId: updateLandingPage
      tags: [landingPage]
      summary: Update landing page config (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLandingPageBody"
      responses:
        "200":
          description: Updated config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LandingPageConfig"

  /landing-page/sections:
    get:
      operationId: listSections
      tags: [landingPage]
      summary: List landing page sections
      responses:
        "200":
          description: Sections list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Section"
    post:
      operationId: createSection
      tags: [landingPage]
      summary: Create a new section (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSectionBody"
      responses:
        "201":
          description: Created section
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Section"

  /landing-page/sections/{id}:
    patch:
      operationId: updateSection
      tags: [landingPage]
      summary: Update section (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSectionBody"
      responses:
        "200":
          description: Updated section
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Section"
    delete:
      operationId: deleteSection
      tags: [landingPage]
      summary: Delete section (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"

  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List documents
      parameters:
        - name: type
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentList"

  /documents/{id}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get document by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete document (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"

  /documents/stats:
    get:
      operationId: getDocumentStats
      tags: [documents]
      summary: Get document statistics by type
      responses:
        "200":
          description: Document stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentStats"

  /documents/{id}/signatures:
    get:
      operationId: getDocumentSignatures
      tags: [documents]
      summary: List all signatures for a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Document signatures
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentSignatureList"

  /documents/{id}/sign:
    post:
      operationId: signDocument
      tags: [documents]
      summary: Sign a document with the current user's signature
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignDocumentBody"
      responses:
        "201":
          description: Signature recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /documents/{id}/request-signatures:
    post:
      operationId: requestDocumentSignatures
      tags: [documents]
      summary: Request signatures from specific users (admin/director/ceo)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestSignaturesBody"
      responses:
        "200":
          description: Requests sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /articles:
    get:
      operationId: listArticles
      tags: [articles]
      summary: List articles
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of articles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleList"
    post:
      operationId: createArticle
      tags: [articles]
      summary: Create article
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateArticleBody"
      responses:
        "201":
          description: Created article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"

  /articles/{id}:
    get:
      operationId: getArticle
      tags: [articles]
      summary: Get article by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
    patch:
      operationId: updateArticle
      tags: [articles]
      summary: Update article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateArticleBody"
      responses:
        "200":
          description: Updated article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
    delete:
      operationId: deleteArticle
      tags: [articles]
      summary: Delete article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"

  /calendar/events:
    get:
      operationId: listEvents
      tags: [calendar]
      summary: List calendar events
      parameters:
        - name: start
          in: query
          schema:
            type: string
        - name: end
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalendarEvent"
    post:
      operationId: createEvent
      tags: [calendar]
      summary: Create calendar event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventBody"
      responses:
        "201":
          description: Created event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"

  /calendar/events/{id}:
    patch:
      operationId: updateEvent
      tags: [calendar]
      summary: Update calendar event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEventBody"
      responses:
        "200":
          description: Updated event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"
    delete:
      operationId: deleteEvent
      tags: [calendar]
      summary: Delete calendar event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"

  /calendar/upcoming:
    get:
      operationId: getUpcomingEvents
      tags: [calendar]
      summary: Get upcoming events (next 7 days)
      responses:
        "200":
          description: Upcoming events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalendarEvent"

  /settings/theme:
    get:
      operationId: getThemeSettings
      tags: [settings]
      summary: Get theme settings
      responses:
        "200":
          description: Theme settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThemeSettings"
    patch:
      operationId: updateThemeSettings
      tags: [settings]
      summary: Update theme settings (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateThemeSettingsBody"
      responses:
        "200":
          description: Updated theme
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThemeSettings"

  /settings/upload-logo:
    post:
      operationId: uploadLogo
      tags: [settings]
      summary: Upload hospital logo (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadFileBody"
      responses:
        "200":
          description: Logo URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"

  /settings/upload-background:
    post:
      operationId: uploadBackground
      tags: [settings]
      summary: Upload login background image (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadFileBody"
      responses:
        "200":
          description: Background URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [settings]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /role-dashboard/config:
    get:
      operationId: getMyDashboardConfig
      tags: [roleDashboard]
      summary: Get dashboard widget config for current user role
      responses:
        "200":
          description: Widget config for caller's role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleDashboardConfig"

  /role-dashboard/configs:
    get:
      operationId: getAllDashboardConfigs
      tags: [roleDashboard]
      summary: Get all role dashboard widget configs (admin only)
      responses:
        "200":
          description: All role configs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AllRoleDashboardConfigs"

  /role-dashboard/config/{role}:
    patch:
      operationId: updateRoleDashboardConfig
      tags: [roleDashboard]
      summary: Update dashboard widget config for a role (admin only)
      parameters:
        - name: role
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoleDashboardBody"
      responses:
        "200":
          description: Updated config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleDashboardConfig"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    DeleteResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    UserProfile:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        full_name:
          type: ["string", "null"]
        full_name_ar:
          type: ["string", "null"]
        role:
          type: string
        avatar_url:
          type: ["string", "null"]
        signature_url:
          type: ["string", "null"]
        department:
          type: ["string", "null"]
        is_active:
          type: boolean
        created_at:
          type: string
      required: [id, email, role, is_active, created_at]

    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        full_name:
          type: ["string", "null"]
        full_name_ar:
          type: ["string", "null"]
        role:
          type: string
        department:
          type: ["string", "null"]
        avatar_url:
          type: ["string", "null"]
        signature_url:
          type: ["string", "null"]
        is_active:
          type: boolean
        created_at:
          type: string
        last_sign_in_at:
          type: ["string", "null"]
      required: [id, email, role, is_active, created_at]

    CreateUserBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
        full_name:
          type: string
        full_name_ar:
          type: ["string", "null"]
        role:
          type: string
        department:
          type: ["string", "null"]
      required: [email, password, full_name, role]

    UpdateUserBody:
      type: object
      properties:
        full_name:
          type: ["string", "null"]
        full_name_ar:
          type: ["string", "null"]
        role:
          type: ["string", "null"]
        department:
          type: ["string", "null"]
        is_active:
          type: ["boolean", "null"]

    UserStats:
      type: object
      properties:
        total:
          type: integer
        by_role:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
              count:
                type: integer
            required: [role, count]
        active:
          type: integer
        inactive:
          type: integer
      required: [total, by_role, active, inactive]

    LandingPageConfig:
      type: object
      properties:
        id:
          type: string
        hospital_name:
          type: string
        hospital_name_ar:
          type: ["string", "null"]
        logo_url:
          type: ["string", "null"]
        background_url:
          type: ["string", "null"]
        theme_colors:
          type: array
          items:
            type: string
        nav_items:
          type: array
          items:
            type: object
            properties:
              label:
                type: string
              label_ar:
                type: ["string", "null"]
              href:
                type: string
            required: [label, href]
        updated_at:
          type: string
      required: [id, hospital_name, theme_colors, nav_items, updated_at]

    UpdateLandingPageBody:
      type: object
      properties:
        hospital_name:
          type: ["string", "null"]
        hospital_name_ar:
          type: ["string", "null"]
        theme_colors:
          type: ["array", "null"]
          items:
            type: string
        nav_items:
          type: ["array", "null"]
          items:
            type: object
            properties:
              label:
                type: string
              label_ar:
                type: ["string", "null"]
              href:
                type: string
            required: [label, href]

    Section:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        title_ar:
